[build]
  base = "app"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Images are NOT immutable at the HTTP layer: catalog.json changes on every
# content deploy, and the service worker + explicit category downloads already
# provide offline caching for the SVGs. ETag revalidation keeps 304s cheap.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
